<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>מוזיאון שפות התכנות ו-Full-Stack — LumenPortal</title>
    <meta name="description" content="מוזיאון שפות התכנות ו-Full-Stack של LumenPortal, ללא תפריטי הפורטל." />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23081224'/%3E%3Cpath d='M12 43 32 9l20 34H12Z' fill='%2322d3ee'/%3E%3Cpath d='M20 43 32 23l12 20H20Z' fill='%23fbbf24'/%3E%3C/svg%3E" />
    <!-- Supported museum versions: museum-root-cause-router-v1, museum-course-bridge-v1, museum-ai-evolution-v1, museum-ai-product-lab-v1, museum-ai-model-deep-dive-v1 -->
    <link
      href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;800&family=Outfit:wght@400;700&family=Fira+Code:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css?v=museum-ai-model-deep-dive-v1" />
  </head>
  <body class="museum-external-page">
    <div class="museum-external-shell">
      <div class="museum-external-topbar">
        <a class="museum-return-button" href="/">חזרה לפורטל הלימודים</a>
      </div>
      <iframe
        class="museum-external-frame"
        title="מוזיאון שפות התכנות ו-Full-Stack"
      ></iframe>
    </div>
    <script>
      (() => {
        try {
          const params = new URLSearchParams(window.location.search);
          const frameParams = new URLSearchParams({
            standalone: "museum",
            v: params.get("v") || "museum-ai-model-deep-dive-v1",
          });
          ["wing", "stackLayer", "hall", "domain", "room", "tour"].forEach((key) => {
            const value = params.get(key);
            if (value) frameParams.set(key, value);
          });
          const frame = document.querySelector(".museum-external-frame");
          if (frame) frame.setAttribute("src", `/?${frameParams.toString()}`);
        } catch (_) {}
      })();
    </script>
  </body>
</html>
