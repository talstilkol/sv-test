<!doctype html><html><head><meta charset="utf-8"><title>SVCollege mobile flow frame</title><style>body{margin:0;background:#111827;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:12px;font-family:Arial,sans-serif}.status{width:390px;color:#e5e7eb;font-size:12px;margin:0 0 8px;text-align:left}iframe{width:390px;height:844px;border:2px solid #38bdf8;border-radius:18px;background:white;box-shadow:0 24px 80px rgba(0,0,0,.45)}</style></head><body><div class="status" id="status">loading</div><iframe id="portal" src="http://127.0.0.1:5173/?svcollege-mobile-smoke=1"></iframe><script>const params=new URLSearchParams(location.search);const flow=params.get('flow')||'trainer';const buttons={trainer:'open-trainer',study:'open-study-mode',mock:'open-mock-exam',trace:'open-trace',codeblocks:'open-codeblocks',blueprints:'open-blueprints'};const status=document.getElementById('status');const iframe=document.getElementById('portal');iframe.addEventListener('load',()=>{try{const id=buttons[flow];const doc=iframe.contentWindow.document;const button=doc.getElementById(id);if(!button){status.textContent='missing:'+flow+':'+id;return;}button.click();iframe.contentWindow.setTimeout(()=>{status.textContent='ready:'+flow;},250);}catch(err){status.textContent='error:'+flow+':'+String(err&&err.message||err);}});</script></body></html>
