name: CI — validate content + syntax

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Dependency vulnerability gate
        run: npm audit --audit-level=moderate

      - name: Syntax-check all data + lib + app files
        run: |
          set -e
          for f in data/*.js; do
            echo "  → $f"
            node --check "$f"
          done
          echo "  → app.js"
          node --check app.js
          echo "  → lib/rng.js"
          node --check lib/rng.js
          echo "  → lib/srs.js"
          node --check lib/srs.js

      - name: Run validate_bank.js (informational summary)
        run: node scripts/validate_bank.js

      # Track A — A3: hard gate for every PR.
      # Strict mode treats warnings, boilerplate matches, and missing-difficulty
      # as build-failing errors. PRs shipping boilerplate / ambiguous fills /
      # concepts without difficulty turn this step (and the PR check) red.
      - name: Strict bank validation (--strict)
        run: node scripts/validate_bank.js --strict

      # Phase 5 — machine-readable feature coverage counters.
      # Staged partials such as full-bank option feedback stay visible in the
      # report. Done modules must also pass the Phase 6 evidence gate: outcome
      # metric + repository evidence.
      - name: Feature coverage gate
        run: node scripts/report_feature_coverage.js --strict --json

      # Phase 5 — full-bank question quality gate.
      # Fails on blocker-level MC/Fill issues. Warnings stay visible in the
      # generated report and remediation queue.
      - name: Question quality gate
        run: node scripts/report_question_quality.js --strict

      # Phase 5 — deterministic remediation queue and 10% manual-QA sample.
      # These checks keep the review batch stable across weekly runs and PRs.
      - name: Question remediation queue gate
        run: node scripts/build_question_remediation_queue.js --strict --summary

      - name: Deterministic 10 percent QA sample gate
        run: node scripts/build_question_qa_checklist.js --strict --summary

      - name: Lesson quiz concept key gate
        run: node scripts/report_lesson_quiz_keys.js --strict --summary

      # PRNG determinism — same seed → same sequence (Track A — A1).
      - name: PRNG determinism test
        run: |
          node -e "
            const RNG = require('./lib/rng.js');
            const a = RNG.create(42), b = RNG.create(42);
            const seqA = [a.next(), a.int(100), a.pick([1,2,3,4,5])];
            const seqB = [b.next(), b.int(100), b.pick([1,2,3,4,5])];
            if (JSON.stringify(seqA) !== JSON.stringify(seqB)) {
              console.error('PRNG NOT deterministic:', seqA, seqB);
              process.exit(1);
            }
            console.log('✅ RNG determinism OK');
          "

      # SRS scheduler — FSRS-4 fields, deterministic timestamps, lapse resets reps.
      - name: SRS scheduler test
        run: |
          node -e "
            const SRS = require('./lib/srs.js');
            const T0 = 1700000000000;
            let s = SRS.createState();
            s = SRS.update(s, true, 5, T0);
            if (s.reps !== 1 || SRS.daysUntilDue(s, T0) < 1 || s.lastReviewed !== T0) {
              console.error('first pass fail', s);
              process.exit(1);
            }
            const firstStability = s.stability;
            s = SRS.update(s, true, 5, s.due + SRS.DAY_MS);
            if (s.reps !== 2 || s.stability <= firstStability) {
              console.error('second pass fail', s);
              process.exit(1);
            }
            s = SRS.update(s, false, 8, s.due + SRS.DAY_MS);
            if (s.reps !== 0 || s.lapses !== 1 || SRS.daysUntilDue(s, s.lastReviewed) > 2) {
              console.error('lapse fail', s);
              process.exit(1);
            }
            console.log('✅ SRS scheduler OK');
          "

      # No Math.random anywhere in authored JS/TS — project-wide deterministic rule.
      - name: No-Math.random gate
        run: |
          set -e
          MATCHES=$(grep -rn 'Math\.random' --include="*.js" --include="*.ts" --exclude-dir=node_modules --exclude-dir=dist --exclude-dir=.git . || true)
          if [ -n "$MATCHES" ]; then
            echo "::error::Math.random found in authored JS/TS:"
            echo "$MATCHES"
            exit 1
          fi
          echo "✅ Math.random absent from authored JS/TS"

      - name: Vite build smoke test
        run: |
          set -euo pipefail
          npm run build 2>&1 | tee /tmp/lumen-vite-build.log
          if grep -q "can't be bundled without type=\"module\"" /tmp/lumen-vite-build.log; then
            echo "::error::Legacy non-module script warning returned in Vite build"
            exit 1
          fi
          if grep -q "data-lumen-legacy-src" dist/index.html; then
            echo "::error::Temporary legacy script attributes leaked into dist/index.html"
            exit 1
          fi

      # P1.1.3 — Vitest unit tests for lib/ + scoring rules.
      - name: Run Vitest unit tests
        run: npm test
